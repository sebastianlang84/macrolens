services:
  web:
    container_name: macrolens-web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      FRED_API_KEY: "${FRED_API_KEY:-}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
